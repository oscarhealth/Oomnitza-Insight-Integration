name: Oomnitza Insight Integration

on:
  push:
  workflow_dispatch:
    inputs:
      insight_order_creation_date_from:
        description: 'Order Creation Date From (YYYY-MM-DD)'
        required: false
        default: ''
      insight_order_creation_date_to:
        description: 'Order Creation Date To (YYYY-MM-DD)'
        required: false
        default: ''
  schedule:
    - cron: '0 6 * * *' # Runs daily at 2am Eastern Time (ET is UTC-4 in July)

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      OOMNITZA_URL: ${{ secrets.OOMNITZA_URL }}
      OOMNITZA_API_TOKEN: ${{ secrets.OOMNITZA_API_TOKEN }}
      OOMNITZA_CONNECTOR_SOURCE: ${{ secrets.OOMNITZA_CONNECTOR_SOURCE }}
      INSIGHT_CLIENT_ID: ${{ secrets.INSIGHT_CLIENT_ID }}
      INSIGHT_CLIENT_KEY: ${{ secrets.INSIGHT_CLIENT_KEY }}
      INSIGHT_CLIENT_SECRET: ${{ secrets.INSIGHT_CLIENT_SECRET }}
      INSIGHT_URL: ${{ secrets.INSIGHT_URL }}
      # Add other secrets as needed
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install OpenLDAP development libraries
        run: sudo apt-get update && sudo apt-get install -y libldap2-dev libsasl2-dev
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run connector with manual or default date range
        env:
          OOMNITZA_URL: ${{ secrets.OOMNITZA_URL }}
          OOMNITZA_API_TOKEN: ${{ secrets.OOMNITZA_API_TOKEN }}
          OOMNITZA_CONNECTOR_SOURCE: ${{ secrets.OOMNITZA_CONNECTOR_SOURCE }}
          INSIGHT_CLIENT_ID: ${{ secrets.INSIGHT_CLIENT_ID }}
          INSIGHT_CLIENT_KEY: ${{ secrets.INSIGHT_CLIENT_KEY }}
          INSIGHT_CLIENT_SECRET: ${{ secrets.INSIGHT_CLIENT_SECRET }}
          INSIGHT_URL: ${{ secrets.INSIGHT_URL }}
          INSIGHT_ENABLED: "True"
        run: |
          # Set date range from workflow_dispatch inputs if provided, else use yesterday/today
          if [[ -n "${{ github.event.inputs.insight_order_creation_date_from }}" ]]; then
            export INSIGHT_ORDER_CREATION_DATE_FROM="${{ github.event.inputs.insight_order_creation_date_from }}"
          else
            export INSIGHT_ORDER_CREATION_DATE_FROM=$(date -u -d 'yesterday' +%Y-%m-%d)
          fi
          if [[ -n "${{ github.event.inputs.insight_order_creation_date_to }}" ]]; then
            export INSIGHT_ORDER_CREATION_DATE_TO="${{ github.event.inputs.insight_order_creation_date_to }}"
          else
            export INSIGHT_ORDER_CREATION_DATE_TO=$(date -u +%Y-%m-%d)
          fi
          python src/connector.py
      # ...existing code for other custom test steps if needed...
